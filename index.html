<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Маленький тест</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: #0a0a0a;
            color: #f0e6d3;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================== SCREENS ==================== */

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s ease;
        }
        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ==================== START ==================== */

        #start {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
        }
        .start-content { text-align: center; padding: 2rem; }

        .start-line {
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(240, 230, 211, 0.45);
            margin-bottom: 1.2rem;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.2s forwards;
        }
        .start-title {
            font-size: clamp(1.6rem, 5.5vw, 3rem);
            font-weight: 300;
            line-height: 1.45;
            margin-bottom: 3.5rem;
            letter-spacing: 0.03em;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.5s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn {
            font-family: inherit;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            font-weight: 400;
            padding: 0.95rem 3.2rem;
            background: transparent;
            color: #f0e6d3;
            border: 1px solid rgba(240, 230, 211, 0.3);
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.18em;
            transition: all 0.45s ease;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.9s forwards;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: rgba(240, 230, 211, 0.07);
            border-color: rgba(240, 230, 211, 0.55);
            box-shadow: 0 0 35px rgba(240, 230, 211, 0.08);
            transform: scale(1.04);
        }
        .btn:active { transform: scale(0.97); }

        /* ==================== QUIZ ==================== */

        #quiz {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
        }
        .quiz-inner {
            width: 100%;
            max-width: 560px;
            padding: 1.5rem;
            text-align: center;
        }
        .q-counter {
            font-size: 0.82rem;
            letter-spacing: 0.4em;
            opacity: 0.35;
            margin-bottom: 1.8rem;
        }
        .q-title {
            font-size: clamp(1.25rem, 4vw, 1.85rem);
            font-weight: 300;
            font-style: italic;
            line-height: 1.55;
            margin-bottom: 2rem;
        }

        .block { margin-bottom: 1.4rem; }
        .block-label {
            font-size: clamp(0.78rem, 2vw, 0.88rem);
            letter-spacing: 0.25em;
            opacity: 0.35;
            margin-bottom: 0.6rem;
            text-transform: lowercase;
        }
        .block-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            justify-content: center;
        }

        .chip {
            font-family: inherit;
            font-size: clamp(0.88rem, 2.3vw, 1rem);
            font-weight: 400;
            padding: 0.6rem 1.1rem;
            background: rgba(255, 255, 255, 0.02);
            color: #f0e6d3;
            border: 1px solid rgba(240, 230, 211, 0.1);
            border-radius: 20px;
            cursor: pointer;
            line-height: 1.35;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            opacity: 0;
            transform: translateY(8px);
        }
        .chip.show {
            opacity: 1;
            transform: translateY(0);
        }
        .chip:hover {
            background: rgba(240, 230, 211, 0.05);
            border-color: rgba(240, 230, 211, 0.28);
        }
        .chip.picked {
            background: rgba(240, 230, 211, 0.1);
            border-color: rgba(240, 230, 211, 0.5);
            box-shadow: 0 0 12px rgba(240, 230, 211, 0.06);
        }

        .q-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.8rem;
        }
        .q-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(240, 230, 211, 0.13);
            transition: all 0.4s ease;
        }
        .q-dot.now  { background: rgba(240, 230, 211, 0.6); transform: scale(1.5); }
        .q-dot.past { background: rgba(240, 230, 211, 0.3); cursor: pointer; }
        .q-dot.past:hover { background: rgba(240, 230, 211, 0.55); transform: scale(1.3); }

        .q-back {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            font-family: inherit;
            font-size: 1.4rem;
            color: rgba(240, 230, 211, 0.3);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            transition: opacity 0.4s ease, color 0.3s ease;
            opacity: 0;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;
        }
        .q-back.vis {
            opacity: 1;
            pointer-events: auto;
        }
        .q-back:hover { color: rgba(240, 230, 211, 0.65); }

        /* ==================== RESULT ==================== */

        #result {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
            z-index: 60;
        }
        .result-msg {
            font-size: clamp(1.1rem, 3vw, 1.45rem);
            font-weight: 300;
            text-align: center;
            padding: 0 2rem;
            margin-bottom: 2.5rem;
            opacity: 0.55;
            line-height: 1.7;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(0);
        }
        #result .btn {
            animation-delay: 0.5s;
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 70;
        }

        /* ---- crack overlay ---- */
        #crack-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            overflow: visible;
        }
        .crack-line {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ---- shatter fragments ---- */
        .fragment {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
            animation: fragFly 1.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        @keyframes fragFly {
            0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
            70%  { opacity: 0.8; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
        }

        /* ==================== CINEMA ==================== */

        #cinema {
            background: #000;
            z-index: 50;
        }

        .particles {
            position: fixed; inset: 0;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240,230,211,0.55) 0%, transparent 70%);
            animation: pFloat linear infinite;
        }
        @keyframes pFloat {
            0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            6%   { opacity: 0.7; transform: translateY(94vh) translateX(0) scale(1); }
            50%  { transform: translateY(50vh) translateX(var(--dx)) scale(0.85); }
            94%  { opacity: 0.5; }
            100% { transform: translateY(-5vh) translateX(var(--dx2)) scale(0.2); opacity: 0; }
        }

        /* ---- scenes ---- */
        .scene {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1;
        }
        .scene.on { opacity: 1; }

        .scene-text {
            font-size: clamp(1.35rem, 5vw, 2.5rem);
            font-weight: 300;
            font-style: italic;
            text-align: center;
            line-height: 1.55;
            padding: 0 2rem;
            z-index: 2;
            letter-spacing: 0.04em;
            text-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }
        .word.vis { opacity: 1; transform: translateY(0); }

        .scene-photo {
            margin-top: 1.5rem;
            width: min(72vw, 340px);
            height: min(72vw, 340px);
            border-radius: 6px;
            overflow: hidden;
            opacity: 0;
            z-index: 1;
        }

        /* reveal styles */
        .scene.photo-fade .scene-photo {
            animation: photoFadeIn 1s ease forwards;
        }
        .scene.photo-fade .scene-photo img {
            animation: kb 5s ease-out forwards;
        }
        @keyframes photoFadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        .scene.photo-circle .scene-photo {
            opacity: 1;
            clip-path: circle(0% at 50% 50%);
            animation: circleOpen 1.2s ease forwards;
        }
        .scene.photo-circle .scene-photo img {
            animation: kb 5s ease-out forwards;
        }
        @keyframes circleOpen {
            to { clip-path: circle(75% at 50% 50%); }
        }

        .scene.photo-slide .scene-photo {
            animation: slideUp 0.9s ease forwards;
        }
        .scene.photo-slide .scene-photo img {
            animation: kb 5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes kb {
            from { transform: scale(1.06); }
            to   { transform: scale(1.16); }
        }

        .scene-photo img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .photo-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(240,230,211,0.035);
            border: 1px dashed rgba(240,230,211,0.12);
            border-radius: 6px;
            color: rgba(240,230,211,0.22);
            font-size: 0.85rem;
            letter-spacing: 0.25em;
        }

        .scene-final-glow {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,180,150,0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.2); opacity: 1; }
        }

        /* ---- glitch overlay ---- */
        #glitch-overlay {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 500;
            opacity: 0;
        }
        #glitch-overlay.on {
            animation: glitchFx 0.28s steps(7) forwards;
        }
        @keyframes glitchFx {
            0%   { opacity: 0; }
            14%  { opacity: 0.7; background: rgba(255,60,60,0.04); transform: translateX(-4px); }
            28%  { opacity: 0; }
            42%  { opacity: 0.5; background: rgba(60,60,255,0.04); transform: translateX(4px) scaleY(1.003); }
            56%  { opacity: 0; }
            71%  { opacity: 0.6; background: rgba(240,230,211,0.03); transform: translateX(-2px); }
            85%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateX(0); }
        }

        /* ==================== MISC ==================== */

        ::selection { background: rgba(240,230,211,0.2); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- ==================== START ==================== -->
<div id="start" class="screen">
    <div class="start-content">
        <div class="start-line">для одного особенного человека</div>
        <h1 class="start-title">Маленький тест</h1>
        <button class="btn" id="btn-start">начать</button>
    </div>
</div>

<!-- ==================== QUIZ ==================== -->
<div id="quiz" class="screen hidden">
    <button class="q-back" id="q-back">&#8592;</button>
    <div class="quiz-inner" id="quiz-inner">
        <div class="q-counter" id="q-counter"></div>
        <div class="q-title" id="q-title"></div>
        <div id="q-blocks"></div>
        <div class="q-dots" id="q-dots"></div>
    </div>
</div>

<!-- ==================== RESULT ==================== -->
<div id="result" class="screen hidden">
    <p class="result-msg" id="result-msg">Готово! Нажми, чтобы узнать результат</p>
    <button class="btn" id="btn-result">показать результат</button>
</div>

<svg id="crack-svg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="display:none">
    <defs>
        <filter id="crack-glow">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
</svg>

<!-- ==================== CINEMA ==================== -->
<div id="cinema" class="screen hidden">
    <div class="particles" id="particles"></div>
</div>

<!-- glitch overlay (shared) -->
<div id="glitch-overlay"></div>

<script>
(function () {
    'use strict';

    /* ======================================================
       DATA
       ====================================================== */

    var questions = [
        {
            title: 'Собери свой идеальный вечер',
            blocks: [
                { label: 'за окном',  options: ['дождь', 'мягкий снег', 'тёплый ветер', 'густой туман'] },
                { label: 'а ты',      options: ['с книгой и какао', 'на прогулке', 'смотришь фильм', 'в тишине и мыслях'] }
            ]
        },
        {
            title: 'Утро, которое хочется запомнить',
            blocks: [
                { label: 'вокруг', options: ['море', 'горы', 'старый город', 'свой дом'] },
                { label: 'свет',   options: ['золотой рассвет', 'мягкие облака', 'сквозь шторы'] }
            ]
        },
        {
            title: 'Музыка, которая сейчас в голове',
            blocks: [
                { label: 'звучит', options: ['тихо и нежно', 'ритмично и живо', 'глубоко и старо', 'тишина'] },
                { label: 'о чём',  options: ['ностальгия', 'свобода', 'тепло', 'красивое одиночество'] }
            ]
        },
        {
            title: 'Ты — кадр из фильма. Какой?',
            blocks: [
                { label: 'ты',   options: ['у окна поезда', 'танцуешь одна', 'пишешь письмо', 'идёшь под дождём'] },
                { label: 'жанр', options: ['тихая драма', 'романтика', 'артхаус', 'фэнтези'] }
            ]
        },
        {
            title: 'Что важнее всего?',
            blocks: [
                { label: 'рядом',   options: ['понимание', 'чувства', 'тишина', 'интерес'] },
                { label: 'и слова', options: ['я слышу тебя', 'я рядом', 'ты особенная', 'расскажи ещё'] }
            ]
        }
    ];

    var scenes = [
        { text: 'она так редка',                                  photo: 'images/1.jpg' },
        { text: 'и так неуловима',                                photo: 'images/2.jpg' },
        { text: 'и я совсем без ума от неё',                      photo: 'images/3.jpg' },
        { text: 'и как бы мне ни казалось,\nчто это иллюзия',     photo: 'images/4.jpg' },
        { text: 'я хочу узнать её лучше',                         photo: 'images/5.jpg' },
        { text: 'я хочу стать с ней ближе',                       photo: 'images/6.jpg' },
        { text: 'ибо кроме неё\nмне ничего не интересно',         photo: 'images/7.jpg' }
    ];

    var photoStyles = ['photo-fade', 'photo-circle', 'photo-slide',
                       'photo-fade', 'photo-circle', 'photo-slide', 'photo-fade'];
    var kbOrigins   = ['center', 'top left', 'top right', 'bottom center',
                       'center left', 'bottom right', 'center top'];

    /* ======================================================
       AUDIO ENGINE  (Web Audio API — no external files)
       ====================================================== */

    var actx;
    function ctx() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        return actx;
    }

    function playCrack(intensity) {
        var c = ctx();
        var dur = 0.12 + intensity * 0.03;
        var buf = c.createBuffer(1, c.sampleRate * dur | 0, c.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) {
            var t = i / d.length;
            var env = t < 0.08 ? t / 0.08 : Math.pow(1 - (t - 0.08) / 0.92, 2.5);
            d[i] = (Math.random() * 2 - 1) * env * (0.2 + intensity * 0.025);
            if (Math.random() < 0.015) d[i] *= 2;
        }
        var src = c.createBufferSource(); src.buffer = buf;
        var f = c.createBiquadFilter(); f.type = 'bandpass';
        f.frequency.value = 900 + Math.random() * 900; f.Q.value = 0.8;
        var g = c.createGain(); g.gain.value = 0.3 + intensity * 0.04;
        src.connect(f); f.connect(g); g.connect(c.destination);
        src.start();
    }

    function playShatter() {
        var c = ctx();
        var dur = 1.4;
        var buf = c.createBuffer(2, c.sampleRate * dur | 0, c.sampleRate);
        for (var ch = 0; ch < 2; ch++) {
            var d = buf.getChannelData(ch);
            for (var i = 0; i < d.length; i++) {
                var t = i / d.length;
                d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.6) * 0.65;
                if (Math.random() < 0.004) d[i] *= 4;
            }
        }
        var src = c.createBufferSource(); src.buffer = buf;
        var f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2800;
        src.connect(f); f.connect(c.destination); src.start();
    }

    function playReveal() {
        var c = ctx();
        var o = c.createOscillator();
        var g = c.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(520, c.currentTime);
        o.frequency.exponentialRampToValueAtTime(260, c.currentTime + 0.6);
        g.gain.setValueAtTime(0.07, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
        o.connect(g); g.connect(c.destination);
        o.start(); o.stop(c.currentTime + 0.6);
    }

    /* ======================================================
       SCREEN MANAGEMENT
       ====================================================== */

    function show(id) {
        document.querySelectorAll('.screen').forEach(function (s) { s.classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
    }

    /* ======================================================
       QUIZ  (block-based)
       ====================================================== */

    var qIdx = 0;
    var selections; // [qIdx][blockIdx] = picked?

    function initSelections() {
        selections = questions.map(function (q) {
            return q.blocks.map(function () { return null; });
        });
    }

    function goTo(idx) {
        qIdx = idx;
        renderQuestion();
    }

    function renderQuestion() {
        var q = questions[qIdx];
        var revisit = selections[qIdx].some(function (s) { return s !== null; });

        document.getElementById('q-counter').textContent = (qIdx + 1) + ' / ' + questions.length;
        document.getElementById('q-title').textContent = q.title;

        var back = document.getElementById('q-back');
        if (qIdx > 0) back.classList.add('vis');
        else back.classList.remove('vis');

        var wrap = document.getElementById('q-blocks');
        wrap.innerHTML = '';
        var chipDelay = 0;

        q.blocks.forEach(function (blk, bi) {
            var div = document.createElement('div');
            div.className = 'block';

            var lbl = document.createElement('div');
            lbl.className = 'block-label';
            lbl.textContent = blk.label;
            div.appendChild(lbl);

            var row = document.createElement('div');
            row.className = 'block-chips';

            blk.options.forEach(function (opt) {
                var c = document.createElement('button');
                c.className = 'chip';
                c.textContent = opt;
                c.addEventListener('click', function () { pickChip(c, bi); });
                row.appendChild(c);

                if (revisit) {
                    c.classList.add('show');
                    if (selections[qIdx][bi] === opt) c.classList.add('picked');
                } else {
                    chipDelay++;
                    var d = chipDelay;
                    setTimeout(function () { c.classList.add('show'); }, d * 50);
                }
            });

            div.appendChild(row);
            wrap.appendChild(div);
        });

        var dots = document.getElementById('q-dots');
        dots.innerHTML = '';
        for (var i = 0; i < questions.length; i++) {
            var dd = document.createElement('div');
            dd.className = 'q-dot';
            if (i < qIdx) {
                dd.classList.add('past');
                dd.addEventListener('click', (function (idx) {
                    return function () { goTo(idx); };
                })(i));
            }
            if (i === qIdx) dd.classList.add('now');
            dots.appendChild(dd);
        }

        var inner = document.getElementById('quiz-inner');
        inner.style.opacity = '0';
        inner.style.transform = 'translateY(16px)';
        requestAnimationFrame(function () {
            inner.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            inner.style.opacity = '1';
            inner.style.transform = 'translateY(0)';
        });
    }

    function pickChip(el, blockIdx) {
        var row = el.parentElement;
        row.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('picked'); });
        el.classList.add('picked');
        selections[qIdx][blockIdx] = el.textContent;

        var allDone = selections[qIdx].every(function (s) { return s !== null; });
        if (allDone) {
            document.querySelectorAll('.chip').forEach(function (c) { c.style.pointerEvents = 'none'; });
            setTimeout(function () {
                qIdx++;
                if (qIdx < questions.length) {
                    renderQuestion();
                } else {
                    show('result');
                    document.getElementById('crack-svg').style.display = '';
                }
            }, 550);
        }
    }

    /* ======================================================
       CRACK MECHANIC
       ====================================================== */

    var clicks = 0;

    function fadeMsg(text, opac) {
        var m = document.getElementById('result-msg');
        m.style.opacity = '0';
        m.style.transform = 'translateY(-5px)';
        setTimeout(function () {
            m.textContent = text;
            m.style.opacity = String(opac != null ? opac : 0.55);
            m.style.transform = 'translateY(0)';
        }, 350);
    }

    function fadeBtn(text) {
        var b = document.getElementById('btn-result');
        b.style.opacity = '0';
        b.style.transform = 'scale(0.96)';
        setTimeout(function () {
            b.textContent = text;
            b.style.opacity = '1';
            b.style.transform = 'scale(1)';
        }, 300);
    }

    function handleResultClick() {
        clicks++;

        if (clicks === 1) {
            fadeBtn('кликни ещё раз');
            fadeMsg('пожалуйста, ещё один клик');
            return;
        }

        if (clicks === 2) {
            fadeMsg('ой, что-то сломалось... продолжай кликать');
            fadeBtn('кликни');
            playCrack(1);
            addCracks(1);
            shakeScreen(1);
            return;
        }

        if (clicks < 10) {
            var intensity = clicks - 1;
            playCrack(intensity);
            addCracks(intensity);
            shakeScreen(intensity);

            if (clicks === 5) fadeMsg('ещё немного...');
            if (clicks === 7) fadeMsg('почти...');
            if (clicks === 9) fadeMsg('...', 0.2);
            return;
        }

        if (clicks === 10) {
            document.getElementById('btn-result').style.pointerEvents = 'none';
            playShatter();
            shatterPage();
        }
    }

    /* ---- crack generation ---- */

    var SVG_NS = 'http://www.w3.org/2000/svg';

    function addCracks(n) {
        var svg = document.getElementById('crack-svg');
        var w = window.innerWidth, h = window.innerHeight;
        var spread = 0.35 + n * 0.1;
        var cx = w / 2 + (Math.random() - 0.5) * w * spread;
        var cy = h / 2 + (Math.random() - 0.5) * h * spread;
        var branches = 2 + Math.floor(n / 2);

        for (var b = 0; b < branches; b++) {
            var angle = Math.random() * Math.PI * 2;
            var len = 80 + Math.random() * 160 + n * 40;
            var pts = crackPath(cx, cy, angle, len);
            drawCrack(svg, pts, n);

            if (Math.random() < 0.65 + n * 0.04) {
                var bi = Math.floor(pts.length * (0.2 + Math.random() * 0.5));
                var ba = angle + (Math.random() - 0.5) * 1.8;
                var bl = len * (0.3 + Math.random() * 0.3);
                drawCrack(svg, crackPath(pts[bi][0], pts[bi][1], ba, bl), n);
            }
            if (n > 3 && Math.random() < 0.45) {
                var bi2 = Math.floor(pts.length * (0.4 + Math.random() * 0.4));
                var ba2 = angle + (Math.random() - 0.5) * 2.2;
                var bl2 = len * (0.2 + Math.random() * 0.25);
                drawCrack(svg, crackPath(pts[bi2][0], pts[bi2][1], ba2, bl2), n);
            }
        }
    }

    function crackPath(x, y, angle, length) {
        var pts = [[x, y]];
        var segs = 7 + Math.floor(Math.random() * 9);
        var sl = length / segs;
        for (var i = 0; i < segs; i++) {
            angle += (Math.random() - 0.5) * 1.0;
            x += Math.cos(angle) * sl;
            y += Math.sin(angle) * sl;
            pts.push([x, y]);
        }
        return pts;
    }

    function drawCrack(svg, pts, intensity) {
        var d = 'M ' + pts.map(function (p) { return p[0] + ' ' + p[1]; }).join(' L ');
        var path = document.createElementNS(SVG_NS, 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', 'rgba(240,230,211,' + (0.25 + intensity * 0.06) + ')');
        path.setAttribute('stroke-width', String(0.8 + intensity * 0.25));
        path.setAttribute('filter', 'url(#crack-glow)');
        path.classList.add('crack-line');

        var total = 0;
        for (var i = 1; i < pts.length; i++) {
            var dx = pts[i][0] - pts[i - 1][0], dy = pts[i][1] - pts[i - 1][1];
            total += Math.sqrt(dx * dx + dy * dy);
        }
        path.style.strokeDasharray = total;
        path.style.strokeDashoffset = total;
        path.style.transition = 'stroke-dashoffset 0.35s ease';
        svg.appendChild(path);
        requestAnimationFrame(function () { path.style.strokeDashoffset = '0'; });
    }

    /* ---- screen shake ---- */

    function shakeScreen(intensity) {
        var el = document.getElementById('result');
        var amp = 2 + intensity * 1.8;
        var dur = 120 + intensity * 25;
        var t0 = performance.now();
        function frame(t) {
            var e = t - t0;
            if (e > dur) { el.style.transform = ''; return; }
            var decay = 1 - e / dur;
            var x = (Math.random() - 0.5) * amp * decay * 2;
            var y = (Math.random() - 0.5) * amp * decay * 2;
            el.style.transform = 'translate(' + x + 'px,' + y + 'px)';
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }

    /* ---- page shatter ---- */

    function rayEdge(cx, cy, a, W, H) {
        var dx = Math.cos(a), dy = Math.sin(a);
        var t = 1e9;
        if (dx > 0.001)  t = Math.min(t, (W - cx) / dx);
        if (dx < -0.001) t = Math.min(t, -cx / dx);
        if (dy > 0.001)  t = Math.min(t, (H - cy) / dy);
        if (dy < -0.001) t = Math.min(t, -cy / dy);
        return [
            Math.max(0, Math.min(W, cx + dx * t)),
            Math.max(0, Math.min(H, cy + dy * t))
        ];
    }

    function edgeId(p, W, H) {
        if (p[1] <= 1)     return 0;
        if (p[0] >= W - 1) return 1;
        if (p[1] >= H - 1) return 2;
        return 3;
    }

    function insertCorners(verts, p1, p2, W, H) {
        var e1 = edgeId(p1, W, H), e2 = edgeId(p2, W, H);
        if (e1 === e2) return;
        var corners = [[W, 0], [W, H], [0, H], [0, 0]];
        var cur = e1;
        while (cur !== e2) {
            verts.push(corners[cur]);
            cur = (cur + 1) % 4;
        }
    }

    function shatterPage() {
        var W = window.innerWidth, H = window.innerHeight;
        var cx = W * 0.5 + (Math.random() - 0.5) * W * 0.06;
        var cy = H * 0.5 + (Math.random() - 0.5) * H * 0.06;

        document.getElementById('cinema').classList.remove('hidden');
        document.getElementById('cinema').style.opacity = '1';
        document.getElementById('result-msg').style.visibility = 'hidden';
        document.getElementById('btn-result').style.visibility = 'hidden';

        var n = 14;
        var angles = [];
        for (var i = 0; i < n; i++) {
            angles.push((i / n) * Math.PI * 2 + (Math.random() - 0.5) * (Math.PI * 2 / n) * 0.55);
        }
        angles.sort(function (a, b) { return a - b; });

        var ePts = angles.map(function (a) { return rayEdge(cx, cy, a, W, H); });
        var maxDist = Math.sqrt(cx * cx + cy * cy);

        for (var i = 0; i < n; i++) {
            var i2 = (i + 1) % n;
            var p1 = ePts[i], p2 = ePts[i2];

            var verts = [[cx, cy], p1];
            insertCorners(verts, p1, p2, W, H);
            verts.push(p2);

            var clip = verts.map(function (v) {
                return (v[0] / W * 100).toFixed(2) + '% ' + (v[1] / H * 100).toFixed(2) + '%';
            }).join(', ');

            var mx = 0, my = 0;
            verts.forEach(function (v) { mx += v[0]; my += v[1]; });
            mx /= verts.length; my /= verts.length;

            var dx = (mx - cx) * 2.8 + (Math.random() - 0.5) * 90;
            var dy = (my - cy) * 2.8 + (Math.random() - 0.5) * 90 + 50;
            var rot = (Math.random() - 0.5) * 30;
            var dist = Math.sqrt((mx - cx) * (mx - cx) + (my - cy) * (my - cy));
            var del = (dist / maxDist) * 0.1;

            var f = document.createElement('div');
            f.className = 'fragment';
            f.style.clipPath = 'polygon(' + clip + ')';
            f.style.webkitClipPath = 'polygon(' + clip + ')';
            f.style.transformOrigin = mx + 'px ' + my + 'px';
            f.style.setProperty('--dx', dx + 'px');
            f.style.setProperty('--dy', dy + 'px');
            f.style.setProperty('--rot', rot + 'deg');
            f.style.animationDelay = del + 's';
            document.body.appendChild(f);
        }

        setTimeout(function () {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('crack-svg').style.display = 'none';
            document.getElementById('result-msg').style.visibility = '';
            document.getElementById('btn-result').style.visibility = '';
            document.querySelectorAll('.fragment').forEach(function (f) { f.remove(); });
            startCinema();
        }, 1700);
    }

    /* ======================================================
       CINEMA
       ====================================================== */

    function spawnParticles() {
        var box = document.getElementById('particles');
        var n = window.innerWidth < 600 ? 22 : 42;
        for (var i = 0; i < n; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            var sz = 2 + Math.random() * 3;
            var dur = 9 + Math.random() * 14;
            var dx = (Math.random() - 0.5) * 70;
            var dx2 = dx + (Math.random() - 0.5) * 50;
            p.style.cssText =
                'left:' + (Math.random() * 100) + '%;' +
                'width:' + sz + 'px;height:' + sz + 'px;' +
                'animation-duration:' + dur + 's;' +
                'animation-delay:-' + (Math.random() * dur) + 's;' +
                '--dx:' + dx + 'px;--dx2:' + dx2 + 'px;';
            box.appendChild(p);
        }
    }

    function buildScenes() {
        var cinema = document.getElementById('cinema');
        scenes.forEach(function (s, i) {
            var div = document.createElement('div');
            div.className = 'scene';
            div.id = 'sc-' + i;

            var txt = document.createElement('div');
            txt.className = 'scene-text';

            var pw = document.createElement('div');
            pw.className = 'scene-photo';
            var img = document.createElement('img');
            img.src = s.photo;
            img.alt = '';
            img.style.transformOrigin = kbOrigins[i];
            img.onerror = function () {
                var ph = document.createElement('div');
                ph.className = 'photo-placeholder';
                ph.textContent = 'фото ' + (i + 1);
                this.replaceWith(ph);
            };
            pw.appendChild(img);

            div.appendChild(txt);
            div.appendChild(pw);

            if (i === scenes.length - 1) {
                var glow = document.createElement('div');
                glow.className = 'scene-final-glow';
                div.appendChild(glow);
            }

            cinema.appendChild(div);
        });
    }

    function startCinema() {
        spawnParticles();
        buildScenes();
        setTimeout(function () { playScene(0); }, 600);
    }

    function playScene(i) {
        if (i >= scenes.length) return;

        var el = document.getElementById('sc-' + i);
        var txt = el.querySelector('.scene-text');
        var isLast = i === scenes.length - 1;

        el.classList.add('on');
        playReveal();

        showWords(txt, scenes[i].text, function () {
            setTimeout(function () {
                el.classList.add(photoStyles[i]);
            }, 400);

            if (!isLast) {
                setTimeout(function () {
                    glitch(function () {
                        el.classList.remove('on', photoStyles[i]);
                        txt.innerHTML = '';
                        setTimeout(function () { playScene(i + 1); }, 500);
                    });
                }, 3800);
            }
        });
    }

    /* ---- word-by-word text ---- */

    function showWords(el, text, done) {
        el.innerHTML = '';
        var allSpans = [];
        var parts = text.split('\n');

        parts.forEach(function (line, li) {
            if (li > 0) el.appendChild(document.createElement('br'));
            var words = line.split(' ');
            words.forEach(function (w, wi) {
                if (wi > 0) el.appendChild(document.createTextNode(' '));
                var span = document.createElement('span');
                span.className = 'word';
                span.textContent = w;
                allSpans.push(span);
                el.appendChild(span);
            });
        });

        allSpans.forEach(function (span, idx) {
            setTimeout(function () { span.classList.add('vis'); }, idx * 190);
        });

        var total = allSpans.length * 190 + 500;
        if (done) setTimeout(done, total);
    }

    /* ---- glitch transition ---- */

    function glitch(cb) {
        var el = document.getElementById('glitch-overlay');
        el.classList.add('on');
        playCrack(2);
        setTimeout(function () {
            el.classList.remove('on');
            if (cb) cb();
        }, 300);
    }

    /* ======================================================
       INIT
       ====================================================== */

    initSelections();

    document.getElementById('btn-start').addEventListener('click', function () {
        show('quiz');
        renderQuestion();
    });

    document.getElementById('q-back').addEventListener('click', function () {
        if (qIdx > 0) goTo(qIdx - 1);
    });

    document.getElementById('btn-result').addEventListener('click', handleResultClick);

})();
</script>
