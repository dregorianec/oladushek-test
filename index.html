<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Какой ты оладушек?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: #0a0a0a;
            color: #f0e6d3;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================== SCREENS ==================== */

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s ease;
        }
        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ==================== START ==================== */

        #start {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
        }
        .start-content { text-align: center; padding: 2rem; }

        .start-line {
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(240, 230, 211, 0.45);
            margin-bottom: 1.2rem;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.2s forwards;
        }
        .start-title {
            font-size: clamp(1.6rem, 5.5vw, 3rem);
            font-weight: 300;
            line-height: 1.45;
            margin-bottom: 3.5rem;
            letter-spacing: 0.03em;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.5s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn {
            font-family: inherit;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            font-weight: 400;
            padding: 0.95rem 3.2rem;
            background: transparent;
            color: #f0e6d3;
            border: 1px solid rgba(240, 230, 211, 0.3);
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.18em;
            transition: all 0.45s ease;
            opacity: 0;
            animation: fadeUp 1.6s ease 0.9s forwards;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: rgba(240, 230, 211, 0.07);
            border-color: rgba(240, 230, 211, 0.55);
            box-shadow: 0 0 35px rgba(240, 230, 211, 0.08);
            transform: scale(1.04);
        }
        .btn:active { transform: scale(0.97); }

        /* ==================== QUIZ ==================== */

        #quiz {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
        }
        .quiz-inner {
            width: 100%;
            max-width: 560px;
            padding: 1.5rem;
            text-align: center;
        }
        .q-counter {
            font-size: 0.82rem;
            letter-spacing: 0.4em;
            opacity: 0.35;
            margin-bottom: 1.8rem;
        }
        .q-title {
            font-size: clamp(1.25rem, 4vw, 1.85rem);
            font-weight: 300;
            font-style: italic;
            line-height: 1.55;
            margin-bottom: 2rem;
        }

        .block { margin-bottom: 1.4rem; }
        .block-label {
            font-size: clamp(0.78rem, 2vw, 0.88rem);
            letter-spacing: 0.25em;
            opacity: 0.35;
            margin-bottom: 0.6rem;
            text-transform: lowercase;
        }
        .block-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            justify-content: center;
        }

        .chip {
            font-family: inherit;
            font-size: clamp(0.88rem, 2.3vw, 1rem);
            font-weight: 400;
            padding: 0.6rem 1.1rem;
            background: rgba(255, 255, 255, 0.02);
            color: #f0e6d3;
            border: 1px solid rgba(240, 230, 211, 0.1);
            border-radius: 20px;
            cursor: pointer;
            line-height: 1.35;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            opacity: 0;
            transform: translateY(8px);
        }
        .chip.show {
            opacity: 1;
            transform: translateY(0);
        }
        .chip:hover {
            background: rgba(240, 230, 211, 0.05);
            border-color: rgba(240, 230, 211, 0.28);
        }
        .chip.picked {
            background: rgba(240, 230, 211, 0.1);
            border-color: rgba(240, 230, 211, 0.5);
            box-shadow: 0 0 12px rgba(240, 230, 211, 0.06);
        }

        .q-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.8rem;
        }
        .q-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(240, 230, 211, 0.13);
            transition: all 0.4s ease;
        }
        .q-dot.now  { background: rgba(240, 230, 211, 0.6); transform: scale(1.5); }
        .q-dot.past { background: rgba(240, 230, 211, 0.3); cursor: pointer; }
        .q-dot.past:hover { background: rgba(240, 230, 211, 0.55); transform: scale(1.3); }

        .q-back {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            font-family: inherit;
            font-size: 1.4rem;
            color: rgba(240, 230, 211, 0.3);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            transition: opacity 0.4s ease, color 0.3s ease;
            opacity: 0;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;
        }
        .q-back.vis {
            opacity: 1;
            pointer-events: auto;
        }
        .q-back:hover { color: rgba(240, 230, 211, 0.65); }

        /* ==================== RESULT ==================== */

        #result {
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
            z-index: 60;
        }
        .result-msg {
            font-size: clamp(1.1rem, 3vw, 1.45rem);
            font-weight: 300;
            text-align: center;
            padding: 0 2rem;
            margin-bottom: 2.5rem;
            opacity: 0.55;
            line-height: 1.7;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(0);
        }
        #result .btn {
            animation-delay: 0.5s;
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 70;
        }

        /* ---- crack overlay ---- */
        #crack-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            overflow: visible;
        }
        .crack-line {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ---- shatter fragments ---- */
        .fragment {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 40%, #2a1f3d 0%, #151020 60%, #0a0a0f 100%);
            animation: fragFall 1.6s cubic-bezier(0.22, 0, 0.7, 0.3) forwards;
        }
        @keyframes fragFall {
            0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
            75%  { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
        }

        /* ==================== CINEMA ==================== */

        #cinema {
            background: #000;
            z-index: 50;
        }

        .particles {
            position: fixed; inset: 0;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240,230,211,0.55) 0%, transparent 70%);
            animation: pFloat linear infinite;
        }
        @keyframes pFloat {
            0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            6%   { opacity: 0.7; transform: translateY(94vh) translateX(0) scale(1); }
            50%  { transform: translateY(50vh) translateX(var(--dx)) scale(0.85); }
            94%  { opacity: 0.5; }
            100% { transform: translateY(-5vh) translateX(var(--dx2)) scale(0.2); opacity: 0; }
        }

        /* ---- scenes ---- */
        .scene {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1;
        }
        .scene.on { opacity: 1; }

        .scene-text {
            font-size: clamp(1.6rem, 6.5vw, 3.2rem);
            font-weight: 300;
            font-style: italic;
            text-align: center;
            line-height: 1.55;
            padding: 0 2rem;
            z-index: 10;
            position: absolute;
            left: 0; right: 0;
            top: 5vh;
            letter-spacing: 0.04em;
            text-shadow: 0 0 50px rgba(0,0,0,0.95), 0 0 25px rgba(0,0,0,0.8);
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }
        .word.vis { opacity: 1; transform: translateY(0); }

        .scene-photo {
            position: relative;
            margin-top: 1.5rem;
            width: min(92vw, 500px);
            height: min(92vw, 500px);
            border-radius: 6px;
            overflow: hidden;
            opacity: 0;
            z-index: 5;
            -webkit-mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
            mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
        }
        .scene-photo.show { opacity: 1; transition: opacity 0.6s ease; }

        .scene-photo img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            opacity: 0;
            transition: opacity 0.45s ease;
            animation: none;
        }
        .scene-photo img.vis {
            opacity: 0.98;
        }
        .scene-photo img.kb {
            animation: kb 4.5s ease-out forwards;
        }
        @keyframes kb {
            from { transform: scale(1.01); }
            to   { transform: scale(1.05); }
        }
        .photo-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(240,230,211,0.035);
            border: 1px dashed rgba(240,230,211,0.12);
            border-radius: 6px;
            color: rgba(240,230,211,0.22);
            font-size: 0.85rem;
            letter-spacing: 0.25em;
        }

        .scene-final-glow {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,180,150,0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.2); opacity: 1; }
        }

        /* ---- glitch overlay ---- */
        #glitch-overlay {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 500;
            opacity: 0;
        }
        #glitch-overlay.on {
            animation: glitchFx 0.28s steps(7) forwards;
        }
        @keyframes glitchFx {
            0%   { opacity: 0; }
            14%  { opacity: 0.7; background: rgba(255,60,60,0.04); transform: translateX(-4px); }
            28%  { opacity: 0; }
            42%  { opacity: 0.5; background: rgba(60,60,255,0.04); transform: translateX(4px) scaleY(1.003); }
            56%  { opacity: 0; }
            71%  { opacity: 0.6; background: rgba(240,230,211,0.03); transform: translateX(-2px); }
            85%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateX(0); }
        }

        /* ==================== MISC ==================== */

        ::selection { background: rgba(240,230,211,0.2); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- ==================== START ==================== -->
<div id="start" class="screen">
    <div class="start-content">
        <div class="start-line">очень важный вопрос</div>
        <h1 class="start-title">Какой ты оладушек?</h1>
        <button class="btn" id="btn-start">начать</button>
    </div>
</div>

<!-- ==================== QUIZ ==================== -->
<div id="quiz" class="screen hidden">
    <button class="q-back" id="q-back">&#8592;</button>
    <div class="quiz-inner" id="quiz-inner">
        <div class="q-counter" id="q-counter"></div>
        <div class="q-title" id="q-title"></div>
        <div id="q-blocks"></div>
        <div class="q-dots" id="q-dots"></div>
    </div>
</div>

<!-- ==================== RESULT ==================== -->
<div id="result" class="screen hidden">
    <p class="result-msg" id="result-msg">Готово! Нажми, чтобы узнать результат</p>
    <button class="btn" id="btn-result">показать результат</button>
</div>

<svg id="crack-svg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="display:none">
    <defs>
        <filter id="crack-glow">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
</svg>

<!-- ==================== CINEMA ==================== -->
<div id="cinema" class="screen hidden">
    <div class="particles" id="particles"></div>
</div>

<!-- glitch overlay (shared) -->
<div id="glitch-overlay"></div>

<script>
(function () {
    'use strict';

    /* ======================================================
       DATA
       ====================================================== */

    var questions = [
        {
            title: 'Собери свой идеальный вечер',
            blocks: [
                { label: 'за окном', options: ['дождь', 'мягкий снег', 'тёплый ветер', 'густой туман', 'гроза'] },
                { label: 'ты', options: ['с книгой и какао', 'под пледом', 'смотришь фильм', 'готовишь что-то вкусное', 'в тишине и мыслях'] },
                { label: 'рядом', options: ['кот', 'свечи', 'музыка', 'кто-то близкий', 'только тишина'] }
            ]
        },
        {
            title: 'Какое время тебе ближе?',
            blocks: [
                { label: 'сезон', options: ['ранняя весна', 'жаркое лето', 'золотая осень', 'первый снег', 'белые ночи'] },
                { label: 'почему', options: ['запахи', 'свет', 'настроение', 'воспоминания', 'свобода'] }
            ]
        },
        {
            title: 'Незнакомый город. Что первое?',
            blocks: [
                { label: 'город', options: ['маленький европейский', 'азиатский мегаполис', 'приморский южный', 'северный с туманами', 'горный'] },
                { label: 'первым делом', options: ['затеряться в улочках', 'найти кофейню', 'залезть повыше', 'сесть у воды', 'зайти на рынок'] },
                { label: 'что заберёшь', options: ['фото', 'открытку', 'рецепт', 'историю', 'ничего — только ощущение'] }
            ]
        },
        {
            title: 'Что сейчас звучит в голове?',
            blocks: [
                { label: 'звук', options: ['тихая мелодия', 'ритм', 'что-то старое и знакомое', 'шум дождя', 'тишина'] },
                { label: 'настроение от этого', options: ['спокойствие', 'энергия', 'ностальгия', 'задумчивость', 'лёгкость'] },
                { label: 'когда это приходит', options: ['в дороге', 'перед сном', 'когда грустно', 'когда хорошо', 'просто так'] }
            ]
        },
        {
            title: 'Ты — кадр из фильма',
            blocks: [
                { label: 'сцена', options: ['у окна поезда', 'танцуешь одна', 'идёшь под дождём', 'сидишь на крыше', 'бежишь по полю'] },
                { label: 'жанр', options: ['тихая драма', 'романтика', 'артхаус', 'фэнтези', 'дорожное кино'] },
                { label: 'палитра', options: ['тёплые тона', 'холодный синий', 'чёрно-белое', 'выгоревшие цвета', 'неон'] }
            ]
        },
        {
            title: 'Если бы можно было замедлить один момент',
            blocks: [
                { label: 'когда', options: ['утро выходного', 'поздний вечер в компании', 'перед поездкой', 'первые минуты в новом месте', 'когда все уже уснули'] },
                { label: 'что в нём важно', options: ['свет', 'звуки', 'запахи', 'тепло', 'слова'] }
            ]
        },
        {
            title: 'Что тебя восстанавливает?',
            blocks: [
                { label: 'тело', options: ['горячая ванна', 'долгая прогулка', 'сон до полудня', 'вкусная еда', 'танцы'] },
                { label: 'голова', options: ['разговор по душам', 'одиночество', 'что-то новое', 'знакомое и привычное', 'творчество'] },
                { label: 'душа', options: ['природа', 'искусство', 'забота', 'смех', 'тишина'] }
            ]
        },
        {
            title: 'Что ты ценишь в людях?',
            blocks: [
                { label: 'сразу чувствуешь', options: ['честность', 'юмор', 'внимание к мелочам', 'спокойствие', 'странность'] },
                { label: 'со временем', options: ['глубину', 'надёжность', 'нежность', 'ум', 'умение быть рядом молча'] }
            ]
        }
    ];

    var scenes = [
        { text: 'она так редка', folder: 'images/1/', files: [
            'art.png','cosmos.png','gazette.png','geisha.png',
            'paint sculp.png','picture.png','punk.png','sculp.png','ser.jpg','srednevecovie.png','orig.jpg'
        ]},
        { text: 'и так неуловима', folder: 'images/2/', files: [
            'eva.png','bisnes.png','money.png','moto.png',
            'panda.png','saloon.png','shield.png','utro.png','vict.png','min.png','orig.jpg'
        ]},
        { text: 'и я совсем без ума от неё', folder: 'images/3/', files: [
            'bal.png','chaos.png','cyber.png','dark.png',
            'drag.png','little.jpg','max.png','meh.png','orig.jpg'
        ]},
        { text: 'я хочу узнать её лучше', folder: 'images/4/', files: [
            'bomb.png','coffee.png','hack.png','idol.png','lun.png',
            'mad.png','mob.png','steam.png','zlo.png','orig.jpg'
        ]},
        { text: 'ибо кроме неё мне ничего не интересно', folder: 'images/5/', files: [
            '1.png','2.png','3.png','4.png','5.png','6.png','7.png'
        ]}
    ];

    var PHOTO_TIME = 5000;
    var kbOrigins = ['center', 'top left', 'top right', 'bottom left',
                     'bottom right', 'center top'];

    /* ======================================================
       AUDIO ENGINE  (Web Audio API — no external files)
       ====================================================== */

    var actx;
    function ctx() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        return actx;
    }

    function playCrack(intensity) {
        var c = ctx();
        var dur = 0.12 + intensity * 0.03;
        var buf = c.createBuffer(1, c.sampleRate * dur | 0, c.sampleRate);
        var d = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) {
            var t = i / d.length;
            var env = t < 0.08 ? t / 0.08 : Math.pow(1 - (t - 0.08) / 0.92, 2.5);
            d[i] = (Math.random() * 2 - 1) * env * (0.2 + intensity * 0.025);
            if (Math.random() < 0.015) d[i] *= 2;
        }
        var src = c.createBufferSource(); src.buffer = buf;
        var f = c.createBiquadFilter(); f.type = 'bandpass';
        f.frequency.value = 900 + Math.random() * 900; f.Q.value = 0.8;
        var g = c.createGain(); g.gain.value = 0.3 + intensity * 0.04;
        src.connect(f); f.connect(g); g.connect(c.destination);
        src.start();
    }

    function playShatter() {
        var c = ctx();
        var dur = 1.4;
        var buf = c.createBuffer(2, c.sampleRate * dur | 0, c.sampleRate);
        for (var ch = 0; ch < 2; ch++) {
            var d = buf.getChannelData(ch);
            for (var i = 0; i < d.length; i++) {
                var t = i / d.length;
                d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.6) * 0.18;
                if (Math.random() < 0.004) d[i] *= 2;
            }
        }
        var src = c.createBufferSource(); src.buffer = buf;
        var f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2800;
        src.connect(f); f.connect(c.destination); src.start();
    }

    function playReveal() {
        var c = ctx();
        var o = c.createOscillator();
        var g = c.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(520, c.currentTime);
        o.frequency.exponentialRampToValueAtTime(260, c.currentTime + 0.6);
        g.gain.setValueAtTime(0.07, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
        o.connect(g); g.connect(c.destination);
        o.start(); o.stop(c.currentTime + 0.6);
    }

    /* ======================================================
       SCREEN MANAGEMENT
       ====================================================== */

    function show(id) {
        document.querySelectorAll('.screen').forEach(function (s) { s.classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
    }

    /* ======================================================
       QUIZ  (block-based)
       ====================================================== */

    var qIdx = 0;
    var selections; // [qIdx][blockIdx] = picked?

    function initSelections() {
        selections = questions.map(function (q) {
            return q.blocks.map(function () { return null; });
        });
    }

    function goTo(idx) {
        qIdx = idx;
        renderQuestion();
    }

    function renderQuestion() {
        var q = questions[qIdx];
        var revisit = selections[qIdx].some(function (s) { return s !== null; });

        document.getElementById('q-counter').textContent = (qIdx + 1) + ' / ' + questions.length;
        document.getElementById('q-title').textContent = q.title;

        var back = document.getElementById('q-back');
        if (qIdx > 0) back.classList.add('vis');
        else back.classList.remove('vis');

        var wrap = document.getElementById('q-blocks');
        wrap.innerHTML = '';
        var chipDelay = 0;

        q.blocks.forEach(function (blk, bi) {
            var div = document.createElement('div');
            div.className = 'block';

            var lbl = document.createElement('div');
            lbl.className = 'block-label';
            lbl.textContent = blk.label;
            div.appendChild(lbl);

            var row = document.createElement('div');
            row.className = 'block-chips';

            blk.options.forEach(function (opt) {
                var c = document.createElement('button');
                c.className = 'chip';
                c.textContent = opt;
                c.addEventListener('click', function () { pickChip(c, bi); });
                row.appendChild(c);

                if (revisit) {
                    c.classList.add('show');
                    if (selections[qIdx][bi] === opt) c.classList.add('picked');
                } else {
                    chipDelay++;
                    var d = chipDelay;
                    setTimeout(function () { c.classList.add('show'); }, d * 50);
                }
            });

            div.appendChild(row);
            wrap.appendChild(div);
        });

        var dots = document.getElementById('q-dots');
        dots.innerHTML = '';
        for (var i = 0; i < questions.length; i++) {
            var dd = document.createElement('div');
            dd.className = 'q-dot';
            if (i < qIdx) {
                dd.classList.add('past');
                dd.addEventListener('click', (function (idx) {
                    return function () { goTo(idx); };
                })(i));
            }
            if (i === qIdx) dd.classList.add('now');
            dots.appendChild(dd);
        }

        var inner = document.getElementById('quiz-inner');
        inner.style.opacity = '0';
        inner.style.transform = 'translateY(16px)';
        requestAnimationFrame(function () {
            inner.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            inner.style.opacity = '1';
            inner.style.transform = 'translateY(0)';
        });
    }

    function pickChip(el, blockIdx) {
        var row = el.parentElement;
        row.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('picked'); });
        el.classList.add('picked');
        selections[qIdx][blockIdx] = el.textContent;

        var allDone = selections[qIdx].every(function (s) { return s !== null; });
        if (allDone) {
            document.querySelectorAll('.chip').forEach(function (c) { c.style.pointerEvents = 'none'; });
            setTimeout(function () {
                qIdx++;
                if (qIdx < questions.length) {
                    renderQuestion();
                } else {
                    show('result');
                    document.getElementById('crack-svg').style.display = '';
                }
            }, 550);
        }
    }

    /* ======================================================
       CRACK MECHANIC
       ====================================================== */

    var clicks = 0;
    var crackStore = [];
    var crackCenters = [];

    function fadeMsg(text, opac) {
        var m = document.getElementById('result-msg');
        m.style.opacity = '0';
        m.style.transform = 'translateY(-5px)';
        setTimeout(function () {
            m.textContent = text;
            m.style.opacity = String(opac != null ? opac : 0.55);
            m.style.transform = 'translateY(0)';
        }, 350);
    }

    function fadeBtn(text) {
        var b = document.getElementById('btn-result');
        b.style.opacity = '0';
        b.style.transform = 'scale(0.96)';
        setTimeout(function () {
            b.textContent = text;
            b.style.opacity = '1';
            b.style.transform = 'scale(1)';
        }, 300);
    }

    function handleResultClick() {
        clicks++;

        if (clicks === 1) {
            fadeBtn('кликни ещё раз');
            fadeMsg('пожалуйста, ещё один клик');
            return;
        }

        if (clicks >= 2 && clicks <= 4) {
            if (clicks === 2) {
                fadeMsg('ой, что-то сломалось... продолжай кликать');
                fadeBtn('кликни');
            }
            playCrack(clicks - 1);
            spawnCrack(clicks - 2);
            shakeScreen(clicks - 1);
            if (clicks === 4) fadeMsg('ещё немного...');
            return;
        }

        if (clicks < 10) {
            var intensity = clicks - 1;
            playCrack(intensity);
            growAllCracks(intensity);
            shakeScreen(intensity);

            if (clicks === 6) fadeMsg('почти...');
            if (clicks === 8) fadeMsg('...', 0.2);
            return;
        }

        if (clicks === 10) {
            document.getElementById('btn-result').style.pointerEvents = 'none';
            playShatter();
            shatterPage();
        }
    }

    /* ---- crack generation ---- */

    var SVG_NS = 'http://www.w3.org/2000/svg';

    function spawnCrack(idx) {
        var svg = document.getElementById('crack-svg');
        var w = window.innerWidth, h = window.innerHeight;

        var zones = [
            [0.25, 0.45, 0.2, 0.4],
            [0.5, 0.72, 0.45, 0.65],
            [0.2, 0.48, 0.55, 0.75]
        ];
        var z = zones[idx];
        var cx = w * (z[0] + Math.random() * (z[1] - z[0]));
        var cy = h * (z[2] + Math.random() * (z[3] - z[2]));
        crackCenters.push([cx, cy]);

        var arms = 4 + Math.floor(Math.random() * 3);
        var baseAngle = Math.random() * Math.PI * 2;

        for (var a = 0; a < arms; a++) {
            var angle = baseAngle + (a / arms) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
            var edge = rayEdge(cx, cy, angle, w, h);
            var edgeDist = Math.sqrt((edge[0] - cx) * (edge[0] - cx) + (edge[1] - cy) * (edge[1] - cy));
            var len = edgeDist * (0.85 + Math.random() * 0.35);

            var pts = glassCrackPath(cx, cy, angle, len);
            drawCrack(svg, pts, 2);
            storeCrack(pts);

            var bc = 1 + Math.floor(Math.random() * 3);
            for (var b = 0; b < bc; b++) {
                var t = 0.1 + Math.random() * 0.55;
                var bi = Math.min(Math.floor(pts.length * t), pts.length - 1);
                var side = Math.random() < 0.5 ? 1 : -1;
                var ba = angle + side * (0.3 + Math.random() * 0.9);
                var bl = len * (0.1 + Math.random() * 0.2) * (1 - t * 0.3);
                var brPts = glassCrackPath(pts[bi][0], pts[bi][1], ba, bl);
                drawCrack(svg, brPts, 2);
                storeCrack(brPts);

                if (Math.random() < 0.35) {
                    var si = Math.min(Math.floor(brPts.length * (0.3 + Math.random() * 0.4)), brPts.length - 1);
                    var sa = ba + (Math.random() - 0.5) * 1.4;
                    var sl2 = bl * (0.25 + Math.random() * 0.3);
                    var sPts = glassCrackPath(brPts[si][0], brPts[si][1], sa, sl2);
                    drawCrack(svg, sPts, 2);
                    storeCrack(sPts);
                }
            }
        }

        var mc = 3 + Math.floor(Math.random() * 4);
        for (var m = 0; m < mc; m++) {
            var ma = Math.random() * Math.PI * 2;
            var mr = 3 + Math.random() * 14;
            var mPts = glassCrackPath(
                cx + Math.cos(ma) * mr,
                cy + Math.sin(ma) * mr,
                ma, 10 + Math.random() * 25
            );
            drawCrack(svg, mPts, 1);
        }
    }

    function glassCrackPath(x, y, angle, length) {
        var pts = [[x, y]];
        var segs = 6 + Math.floor(Math.random() * 10);
        var remaining = length;

        for (var i = 0; i < segs && remaining > 2; i++) {
            var ratio = 0.35 + Math.random() * 1.3;
            var sl = Math.min((length / segs) * ratio, remaining);
            remaining -= sl;

            var r = Math.random();
            var dev;
            if (r < 0.1) {
                dev = (Math.random() - 0.5) * 2.2;
            } else if (r < 0.3) {
                dev = (Math.random() - 0.5) * 1.0;
            } else {
                dev = (Math.random() - 0.5) * 0.35;
            }
            angle += dev;

            x += Math.cos(angle) * sl;
            y += Math.sin(angle) * sl;
            pts.push([x, y]);
        }
        return pts;
    }

    function storeCrack(pts) {
        if (pts.length < 2) return;
        var last = pts[pts.length - 1];
        var prev = pts[pts.length - 2];
        crackStore.push({
            endX: last[0],
            endY: last[1],
            endAngle: Math.atan2(last[1] - prev[1], last[0] - prev[0])
        });
    }

    function growAllCracks(intensity) {
        var svg = document.getElementById('crack-svg');
        var count = Math.min(crackStore.length, 4 + Math.floor(intensity * 1.2));
        var indices = [];
        for (var i = 0; i < crackStore.length; i++) indices.push(i);
        indices.sort(function () { return Math.random() - 0.5; });
        for (var g = 0; g < count; g++) {
            growCrack(svg, crackStore[indices[g]], intensity);
        }
    }

    function growCrack(svg, crack, intensity) {
        var len = 30 + Math.random() * 60 + intensity * 22;
        var angle = crack.endAngle + (Math.random() - 0.5) * 0.6;
        var pts = glassCrackPath(crack.endX, crack.endY, angle, len);
        drawCrack(svg, pts, 2);
        var last = pts[pts.length - 1];
        var prev = pts[pts.length - 2];
        crack.endX = last[0];
        crack.endY = last[1];
        crack.endAngle = Math.atan2(last[1] - prev[1], last[0] - prev[0]);

        var branchChance = 0.25 + intensity * 0.06;
        var branches = Math.random() < branchChance ? (intensity > 5 ? 2 : 1) : 0;
        for (var br = 0; br < branches; br++) {
            var bi = Math.min(Math.floor(pts.length * (0.2 + Math.random() * 0.5)), pts.length - 1);
            var ba = angle + (Math.random() < 0.5 ? 1 : -1) * (0.35 + Math.random() * 0.85);
            var bl = len * (0.3 + Math.random() * 0.4);
            var brPts = glassCrackPath(pts[bi][0], pts[bi][1], ba, bl);
            drawCrack(svg, brPts, 2);
            storeCrack(brPts);
        }
    }

    function drawCrack(svg, pts, intensity) {
        var d = 'M ' + pts.map(function (p) { return p[0] + ' ' + p[1]; }).join(' L ');
        var path = document.createElementNS(SVG_NS, 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', 'rgba(240,230,211,0.3)');
        path.setAttribute('stroke-width', '1');
        path.setAttribute('filter', 'url(#crack-glow)');
        path.classList.add('crack-line');

        var total = 0;
        for (var i = 1; i < pts.length; i++) {
            var dx = pts[i][0] - pts[i - 1][0], dy = pts[i][1] - pts[i - 1][1];
            total += Math.sqrt(dx * dx + dy * dy);
        }
        path.style.strokeDasharray = total;
        path.style.strokeDashoffset = total;
        path.style.transition = 'stroke-dashoffset 0.35s ease';
        svg.appendChild(path);
        requestAnimationFrame(function () { path.style.strokeDashoffset = '0'; });
    }

    /* ---- screen shake ---- */

    function shakeScreen(intensity) {
        var el = document.getElementById('result');
        var amp = 2 + intensity * 1.8;
        var dur = 120 + intensity * 25;
        var t0 = performance.now();
        function frame(t) {
            var e = t - t0;
            if (e > dur) { el.style.transform = ''; return; }
            var decay = 1 - e / dur;
            var x = (Math.random() - 0.5) * amp * decay * 2;
            var y = (Math.random() - 0.5) * amp * decay * 2;
            el.style.transform = 'translate(' + x + 'px,' + y + 'px)';
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }

    /* ---- page shatter ---- */

    function rayEdge(cx, cy, a, W, H) {
        var dx = Math.cos(a), dy = Math.sin(a);
        var t = 1e9;
        if (dx > 0.001)  t = Math.min(t, (W - cx) / dx);
        if (dx < -0.001) t = Math.min(t, -cx / dx);
        if (dy > 0.001)  t = Math.min(t, (H - cy) / dy);
        if (dy < -0.001) t = Math.min(t, -cy / dy);
        return [
            Math.max(0, Math.min(W, cx + dx * t)),
            Math.max(0, Math.min(H, cy + dy * t))
        ];
    }

    function edgeId(p, W, H) {
        if (p[1] <= 1)     return 0;
        if (p[0] >= W - 1) return 1;
        if (p[1] >= H - 1) return 2;
        return 3;
    }

    function insertCorners(verts, p1, p2, W, H) {
        var e1 = edgeId(p1, W, H), e2 = edgeId(p2, W, H);
        if (e1 === e2) return;
        var corners = [[W, 0], [W, H], [0, H], [0, 0]];
        var cur = e1;
        while (cur !== e2) {
            verts.push(corners[cur]);
            cur = (cur + 1) % 4;
        }
    }

    function nearestCrackDist(x, y) {
        var min = 1e9;
        for (var i = 0; i < crackCenters.length; i++) {
            var dx = x - crackCenters[i][0], dy = y - crackCenters[i][1];
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < min) min = d;
        }
        return min;
    }

    function jitterPt(x, y, jx, jy, W, H, edgeX, edgeY) {
        if (!edgeX) x += (Math.random() - 0.5) * jx;
        if (!edgeY) y += (Math.random() - 0.5) * jy;
        return [Math.max(0, Math.min(W, x)), Math.max(0, Math.min(H, y))];
    }

    function shatterPage() {
        var W = window.innerWidth, H = window.innerHeight;

        var bx = W * (0.4 + Math.random() * 0.2);
        var by = H * (0.3 + Math.random() * 0.3);

        document.getElementById('cinema').classList.remove('hidden');
        document.getElementById('cinema').style.opacity = '1';
        document.getElementById('crack-svg').style.display = 'none';
        var resultEl = document.getElementById('result');
        resultEl.style.transition = 'none';
        resultEl.style.opacity = '0';
        resultEl.style.visibility = 'hidden';
        resultEl.style.pointerEvents = 'none';

        startCinema();

        var cols = 14, rows = 20;
        var cellW = W / cols, cellH = H / rows;
        var grid = [];

        for (var r = 0; r <= rows; r++) {
            grid[r] = [];
            for (var c = 0; c <= cols; c++) {
                grid[r][c] = jitterPt(
                    c * cellW, r * cellH,
                    cellW * 0.72, cellH * 0.72,
                    W, H,
                    c === 0 || c === cols,
                    r === 0 || r === rows
                );
            }
        }

        var maxDist = Math.sqrt(W * W + H * H) * 0.5;
        var closeR = Math.min(W, H) * 0.2;
        var midR = Math.min(W, H) * 0.4;
        var pieces = [];

        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var tl = grid[r][c], tr = grid[r][c + 1];
                var bl = grid[r + 1][c], br = grid[r + 1][c + 1];
                var cmx = (tl[0] + tr[0] + br[0] + bl[0]) / 4;
                var cmy = (tl[1] + tr[1] + br[1] + bl[1]) / 4;
                var cd = nearestCrackDist(cmx, cmy);

                if (cd < closeR) {
                    var cen = jitterPt(cmx, cmy, cellW * 0.2, cellH * 0.2, W, H, false, false);
                    var mt = [(tl[0] + tr[0]) / 2 + (Math.random() - 0.5) * cellW * 0.15,
                              (tl[1] + tr[1]) / 2 + (Math.random() - 0.5) * cellH * 0.15];
                    var mr = [(tr[0] + br[0]) / 2 + (Math.random() - 0.5) * cellW * 0.15,
                              (tr[1] + br[1]) / 2 + (Math.random() - 0.5) * cellH * 0.15];
                    var mb = [(bl[0] + br[0]) / 2 + (Math.random() - 0.5) * cellW * 0.15,
                              (bl[1] + br[1]) / 2 + (Math.random() - 0.5) * cellH * 0.15];
                    var ml = [(tl[0] + bl[0]) / 2 + (Math.random() - 0.5) * cellW * 0.15,
                              (tl[1] + bl[1]) / 2 + (Math.random() - 0.5) * cellH * 0.15];
                    pieces.push([tl, mt, cen, ml]);
                    pieces.push([mt, tr, mr, cen]);
                    pieces.push([cen, mr, br, mb]);
                    pieces.push([ml, cen, mb, bl]);
                } else if (cd < midR) {
                    if (Math.random() < 0.5) {
                        pieces.push([tl, tr, br]);
                        pieces.push([tl, br, bl]);
                    } else {
                        pieces.push([tl, tr, bl]);
                        pieces.push([tr, br, bl]);
                    }
                } else {
                    pieces.push([tl, tr, br, bl]);
                }
            }
        }

        for (var i = 0; i < pieces.length; i++) {
            var verts = pieces[i];

            var clip = verts.map(function (v) {
                return (v[0] / W * 100).toFixed(2) + '% ' + (v[1] / H * 100).toFixed(2) + '%';
            }).join(', ');

            var mx = 0, my = 0;
            for (var v = 0; v < verts.length; v++) {
                mx += verts[v][0]; my += verts[v][1];
            }
            mx /= verts.length; my /= verts.length;

            var dirX = mx - bx, dirY = my - by;
            var dx = dirX * 0.2 + (Math.random() - 0.5) * 22;
            var dy = H * 0.6 + Math.random() * H * 0.6;
            var rot = (Math.random() - 0.5) * 30 + (dirX > 0 ? 1 : -1) * 4;

            var dist = Math.sqrt(dirX * dirX + dirY * dirY);
            var del = (dist / maxDist) * 0.5 + Math.random() * 0.04;

            var bright = 0.82 + Math.random() * 0.36;

            var f = document.createElement('div');
            f.className = 'fragment';
            f.style.clipPath = 'polygon(' + clip + ')';
            f.style.webkitClipPath = 'polygon(' + clip + ')';
            f.style.transformOrigin = mx + 'px ' + my + 'px';
            f.style.filter = 'brightness(' + bright.toFixed(2) + ')';
            f.style.setProperty('--dx', dx + 'px');
            f.style.setProperty('--dy', dy + 'px');
            f.style.setProperty('--rot', rot + 'deg');
            f.style.animationDelay = del + 's';
            document.body.appendChild(f);
        }

        setTimeout(function () {
            document.querySelectorAll('.fragment').forEach(function (f) { f.remove(); });
        }, 2500);
    }

    /* ======================================================
       CINEMA
       ====================================================== */

    function spawnParticles() {
        var box = document.getElementById('particles');
        var n = window.innerWidth < 600 ? 22 : 42;
        for (var i = 0; i < n; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            var sz = 2 + Math.random() * 3;
            var dur = 9 + Math.random() * 14;
            var dx = (Math.random() - 0.5) * 70;
            var dx2 = dx + (Math.random() - 0.5) * 50;
            p.style.cssText =
                'left:' + (Math.random() * 100) + '%;' +
                'width:' + sz + 'px;height:' + sz + 'px;' +
                'animation-duration:' + dur + 's;' +
                'animation-delay:-' + (Math.random() * dur) + 's;' +
                '--dx:' + dx + 'px;--dx2:' + dx2 + 'px;';
            box.appendChild(p);
        }
    }

    function buildScenes() {
        var cinema = document.getElementById('cinema');
        scenes.forEach(function (s, i) {
            var div = document.createElement('div');
            div.className = 'scene';
            div.id = 'sc-' + i;

            var txt = document.createElement('div');
            txt.className = 'scene-text';

            var pw = document.createElement('div');
            pw.className = 'scene-photo';

            for (var p = 0; p < s.files.length; p++) {
                var img = document.createElement('img');
                img.src = s.folder + s.files[p];
                img.alt = '';
                img.style.transformOrigin = kbOrigins[p % kbOrigins.length];
                img.onerror = (function (idx) {
                    return function () {
                        var ph = document.createElement('div');
                        ph.className = 'photo-placeholder';
                        ph.textContent = 'фото ' + (idx + 1);
                        ph.style.cssText = 'position:absolute;inset:0;';
                        this.replaceWith(ph);
                    };
                })(p);
                pw.appendChild(img);
            }

            div.appendChild(txt);
            div.appendChild(pw);

            if (i === scenes.length - 1) {
                var glow = document.createElement('div');
                glow.className = 'scene-final-glow';
                div.appendChild(glow);
            }

            cinema.appendChild(div);
        });
    }

    function startCinema() {
        spawnParticles();
        buildScenes();
        setTimeout(function () { playScene(0); }, 600);
    }

    function playScene(i) {
        if (i >= scenes.length) return;

        var el = document.getElementById('sc-' + i);
        var txt = el.querySelector('.scene-text');
        var pw = el.querySelector('.scene-photo');
        var imgs = pw.querySelectorAll('img');
        var isLast = i === scenes.length - 1;
        var perPhoto = PHOTO_TIME / scenes[i].files.length;

        el.classList.add('on');

        showWords(txt, scenes[i].text, function () {
            setTimeout(function () {
                pw.classList.add('show');
                runSlideshow(imgs, perPhoto);
            }, 250);

            var totalPhotoTime = PHOTO_TIME + 400;

            if (!isLast) {
                setTimeout(function () {
                    glitch(function () {
                        txt.innerHTML = '';
                        setTimeout(function () { playScene(i + 1); }, 300);
                    });
                }, totalPhotoTime);
            }
        });
    }

    var MAX_VISIBLE_PHOTOS = 2;

    function runSlideshow(imgs, interval) {
        for (var j = 0; j < imgs.length; j++) {
            (function (idx) {
                setTimeout(function () {
                    imgs[idx].classList.add('vis', 'kb');
                    var allVis = document.querySelectorAll('.scene-photo img.vis');
                    while (allVis.length > MAX_VISIBLE_PHOTOS) {
                        allVis[0].classList.remove('vis', 'kb');
                        allVis = document.querySelectorAll('.scene-photo img.vis');
                    }
                }, idx * interval);
            })(j);
        }
    }

    /* ---- word-by-word text ---- */

    function showWords(el, text, done) {
        el.innerHTML = '';
        var allSpans = [];
        var parts = text.split('\n');

        parts.forEach(function (line, li) {
            if (li > 0) el.appendChild(document.createElement('br'));
            var words = line.split(' ');
            words.forEach(function (w, wi) {
                if (wi > 0) el.appendChild(document.createTextNode(' '));
                var span = document.createElement('span');
                span.className = 'word';
                span.textContent = w;
                allSpans.push(span);
                el.appendChild(span);
            });
        });

        allSpans.forEach(function (span, idx) {
            setTimeout(function () { span.classList.add('vis'); }, idx * 150);
        });

        var total = allSpans.length * 150 + 300;
        if (done) setTimeout(done, total);
    }

    /* ---- glitch transition ---- */

    function glitch(cb) {
        var el = document.getElementById('glitch-overlay');
        el.classList.add('on');
        setTimeout(function () {
            el.classList.remove('on');
            if (cb) cb();
        }, 300);
    }

       INIT
       ====================================================== */

    initSelections();

    document.getElementById('btn-start').addEventListener('click', function () {
        show('quiz');
        renderQuestion();
    });

    document.getElementById('q-back').addEventListener('click', function () {
        if (qIdx > 0) goTo(qIdx - 1);
    });

    document.getElementById('btn-result').addEventListener('click', handleResultClick);

})();
</script>

</body>
